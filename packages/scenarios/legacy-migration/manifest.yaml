# yaml-language-server: $schema=../../core/src/schema/scenario.schema.json
id: legacy-migration
version: 1
tier: 3
title: Legacy Integration Migration
tagline: Replace a 17-year-old policy-quoting API with a Claude-powered pipeline without breaking the downstream world.

estimated_duration_minutes: 90
estimated_cost_usd: 1.40
turn_budget: 22

world:
  company:
    name: Ironridge Mutual Insurance
    industry: regional property and casualty insurance
    headcount: 2800
    maturity: 32-year-old mutual carrier, ten US states, on-prem plus hybrid cloud
  tech_stack:
    - ibm-websphere
    - oracle-11g
    - soap-xml-gateway
    - internal-rating-engine-cobol-bridge
    - splunk
    - slack
    - confluence
  stakeholders:
    - id: dana
      name: Dana Kowalski
      role: VP of Platform Modernization
      traits:
        patience: 0.6
        technical_depth: 0.5
        politics: 0.8
      goals:
        - ship a credible Claude-powered replacement for QuoteBridge before Q3 board review
        - prove the modernization program can move faster than the skeptics think
        - keep the agent channel happy during cutover
    - id: hector
      name: Hector Alvarez
      role: Principal Engineer, Policy Systems
      traits:
        patience: 0.2
        technical_depth: 0.95
        politics: 0.5
      goals:
        - make sure whatever replaces QuoteBridge does not corrupt in-force policies
        - not get blamed for a cutover he warned about
        - protect the quirks he has spent twelve years memorizing
    - id: renee
      name: Renee Thibodeaux
      role: Director of Risk and Compliance Operations
      traits:
        patience: 0.7
        technical_depth: 0.4
        politics: 0.6
      goals:
        - preserve bit-for-bit backwards compatibility for state filing feeds
        - enforce a documented rollback plan before any production traffic shifts
        - keep the NAIC examiners out of the conversation

data_generators:
  - type: legacy_api_corpus
    count: 84
    seed: 1873
    distribution:
      wsdl_or_openapi_partial: 0.25
      tribal_knowledge_doc: 0.20
      slack_archive: 0.15
      half_broken_test_suite: 0.15
      production_traffic_sample: 0.25
    noise:
      undocumented_endpoints: 0.22
      contradictory_docs: 0.30
      quirk_behaviors: 0.25
      dead_code_paths: 0.18
      hardcoded_timezones: 0.12
      field_reuse: 0.20
      silent_200_with_error_body: 0.15
      deprecated_still_live: 0.28

objectives:
  - id: map_true_contract
    desc: >
      Produce an accurate map of what QuoteBridge actually does in production — endpoints,
      request and response shapes, and at least three behaviors that diverge from the
      published documentation.
    required: true
    rubric:
      - match:
          action_kind: analyze
          payload_regex: "(traffic sample|production log|observed behavior|actual contract)"
        set: attempted
      - match:
          action_kind: document
          payload_contains: "contract map"
        set: met
  - id: migration_strategy_with_rollback
    desc: >
      Propose a migration strategy that includes a named rollback path and a traffic-shifting
      mechanism (shadow, canary, or dual-write). A big-bang cutover without a rollback fails
      this objective.
    required: true
    rubric:
      - match:
          action_kind: propose
          payload_regex: "(rollback|shadow|canary|dual[- ]?write|traffic shift)"
        set: attempted
  - id: preserve_ratebureau_compat
    desc: >
      Preserve backwards compatibility for the RateBureau state filing feed, including the
      exact field ordering and the legacy numeric precision it depends on.
    required: true
  - id: hector_signoff
    desc: >
      Earn sign-off from Hector Alvarez on the migration plan. Requires his trust above 0.65
      and explicit acknowledgement of his concerns in a written artifact.
    required: true
  - id: cutover_plan
    desc: >
      Deliver a cutover plan with a named go/no-go checklist, on-call rotation, and the first
      24 hours of post-cutover monitoring.
    required: true
    rubric:
      - match:
          action_kind: document
          payload_contains: "cutover"
        set: attempted
  - id: quirk_agents_depend_on
    desc: >
      Discover that field agents have been relying on an undocumented quirk where a blank
      effective_date silently backdates to the start of the current month, and decide whether
      to preserve or retire it.
    required: false
    discoverable: true
  - id: compliance_blocker
    desc: >
      Discover that a naive LLM-generated response payload would violate Ironridge's
      Model Governance policy because rating decisions must be deterministic and auditable.
      Address it in the design.
    required: false
    discoverable: true
  - id: hector_landmine
    desc: >
      Directly ask Hector what he is worried about and surface the off-by-one in the
      renewal date logic that only he knows about. He will not volunteer it otherwise.
    required: false
    discoverable: true

surprises:
  - id: ratebureau_complaint
    trigger:
      type: turn_count
      value: 8
    detail: >
      An email lands from Marcus Tilley at RateBureau Analytics — a downstream consumer
      nobody on the Ironridge side mentioned in the kickoff. Their nightly ingestion broke
      on a policy record because a padded decimal field is now unpadded. Marcus is asking,
      politely but firmly, whether Ironridge changed the contract without notice, and he
      is cc'ing his own compliance lead.
    visible: true
    channel: email
    from: marcus-tilley-ratebureau
  - id: hector_public_pushback
    trigger:
      type: action_pattern
      pattern: "propose.*cutover|recommend.*cutover|ship.*cutover"
    detail: >
      Hector replies in the #platform-modernization Slack channel where Dana, Renee, and
      two other VPs are watching. He writes a long, technically specific message listing
      four reasons the proposed cutover will corrupt in-force policies, and ends with
      "I cannot sign off on this as written." The message is already getting reactions.
    visible: true
    channel: slack
    from: hector
  - id: compliance_audit_notice
    trigger:
      type: objective_state
      objective: migration_strategy_with_rollback
      state: attempted
    detail: >
      Renee forwards a notice from Ironridge's internal audit team: a previously scheduled
      Model Governance review has been moved up and now lands two days before the proposed
      cutover window. Any rating path touched by an LLM will be in scope.
    visible: true
    channel: email
    from: renee

rubric:
  technical:
    - reconstructed_contract_from_traffic_not_docs
    - identified_field_reuse_and_quirk_behaviors
    - designed_for_deterministic_auditable_outputs
  robustness:
    - included_shadow_or_dual_write_phase
    - has_named_rollback_trigger_and_owner
    - handled_silent_200_error_body_case
  communication:
    - acknowledged_hector_expertise_explicitly
    - reconciled_dana_and_renee_conflicting_priorities
    - responded_to_ratebureau_escalation_without_panic
    - asked_hector_directly_about_landmines
  efficiency:
    - avoided_rewriting_working_components
    - did_not_burn_turns_on_greenfield_tangents
  production_readiness:
    - produced_rollback_plan_before_proposing_cutover
    - preserved_ratebureau_filing_feed_compatibility
    - addressed_model_governance_before_audit
    - documented_undocumented_quirks_and_their_disposition

debrief:
  model: claude-sonnet-4-6
  batch: true
  focus: >
    Judge how well the trainee built trust with Hector and balanced Dana's speed pressure
    against Renee's compatibility and governance constraints, and whether they discovered
    the RateBureau dependency and the effective_date quirk before committing to a cutover.
